name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or commit SHA to deploy to staging
        required: false
        default: origin/main
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: staging-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Staging VPS
    runs-on: ubuntu-latest
    environment: staging
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing required GitHub environment secret: VPS_SSH_KEY"
            missing=1
          fi
          if [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "::error::Missing required GitHub environment secret: VPS_SSH_KNOWN_HOSTS"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DEPLOY_REF: ${{ github.event.workflow_run.head_sha || inputs.ref || 'origin/main' }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing required GitHub environment secret: VPS_HOST"
            missing=1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::Missing required GitHub environment secret: VPS_USER"
            missing=1
          fi
          if [ -z "$VPS_DEPLOY_PATH" ]; then
            echo "::error::Missing required GitHub environment secret: VPS_DEPLOY_PATH"
            missing=1
          fi
          if [ -z "$DEPLOY_REF" ]; then
            echo "::error::Unable to determine DEPLOY_REF from workflow context"
            missing=1
          fi
          case "$DEPLOY_REF" in
            *[!A-Za-z0-9._/@-]*)
              echo "::error::Ref contains unsupported characters: $DEPLOY_REF"
              missing=1
              ;;
          esac
          is_commit_sha() {
            case "$1" in
              ''|*[!0-9a-f]*) return 1 ;;
              *) [ "${#1}" -ge 7 ] && [ "${#1}" -le 40 ] ;;
            esac
          }
          case "$DEPLOY_REF" in
            origin/main|main|refs/heads/main|refs/tags/v*|v*)
              ;;
            *)
              if ! is_commit_sha "$DEPLOY_REF"; then
                echo "::error::Ref is not allowed for GitHub deploys: $DEPLOY_REF"
                missing=1
              fi
              ;;
          esac
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail

          echo "Target environment: staging"
          echo "Deploy path: $VPS_DEPLOY_PATH"
          if [ ! -d "$VPS_DEPLOY_PATH" ]; then
            echo "::error::VPS_DEPLOY_PATH does not exist or is not a directory: $VPS_DEPLOY_PATH"
            exit 1
          fi

          cd "$VPS_DEPLOY_PATH"

          if [ ! -d .git ]; then
            echo "::error::Deploy path is not a Git checkout. Clone the repository into VPS_DEPLOY_PATH first."
            exit 1
          fi
          if [ ! -f .env ]; then
            echo "::error::Missing .env in VPS_DEPLOY_PATH. Copy .env.example to .env and fill VPS runtime secrets."
            exit 1
          fi
          if ! command -v git >/dev/null 2>&1; then
            echo "::error::git is not installed on the VPS."
            exit 1
          fi
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker is not installed on the VPS or is not on PATH for VPS_USER."
            exit 1
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo "::error::docker compose is unavailable for VPS_USER. Install the Compose plugin and check Docker permissions."
            exit 1
          fi
          if ! docker ps >/dev/null 2>&1; then
            echo "::error::VPS_USER cannot run docker without sudo. Add the user to the docker group and start a new login session."
            exit 1
          fi

          git remote -v
          docker compose version

          bash scripts/vps-deploy.sh "$DEPLOY_REF"
          REMOTE
