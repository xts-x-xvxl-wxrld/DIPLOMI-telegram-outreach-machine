name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or commit SHA to deploy
        required: false
        default: origin/main
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Reset deploy checkout and restart Compose
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_SSH_KNOWN_HOSTS"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DEPLOY_REF: ${{ github.event.workflow_run.head_sha || inputs.ref || 'origin/main' }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_DEPLOY_PATH"
          test -n "$DEPLOY_REF"

          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$VPS_DEPLOY_PATH"
          test -f .env

          git fetch --prune origin
          git reset --hard "$DEPLOY_REF"
          git clean -ffdx \
            -e .env \
            -e .env.local \
            -e sessions/ \
            -e telegram_sessions/ \
            -e postgres_data/ \
            -e redis_data/

          docker compose build api worker bot
          docker compose up -d postgres redis

          for attempt in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres -d telegram_outreach; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Postgres did not become ready in time." >&2
              exit 1
            fi

            sleep 2
          done

          docker compose run --rm api alembic upgrade head
          docker compose up -d --remove-orphans
          docker compose ps
          REMOTE
